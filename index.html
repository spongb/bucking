<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucking Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Click to Buck the Stem</h1>
        <canvas id="logCanvas" width="800" height="200"></canvas>
        <div id="info">
            <p>Segments: <span id="segmentCount">0</span> | Total Value: $<span id="totalValue">0</span></p>
            <button id="computeOptimal">Show Optimal</button>
            <button id="reset">Reset</button>
        </div>
        <div id="segments"></div>
        <div id="info">
    <p>Segments: <span id="segmentCount">0</span> | Total Value: $<span id="totalValue">0</span></p>
    <label><strong>Trim allowance:</strong>
        <input id="trimInput" type="number" value="3" min="0" max="12" step="0.5"
               style="width:55px; margin:0 4px;"> inches per log
    </label>
    <br><br>
    <button id="computeOptimal">Show Optimal</button>
    <button id="newLog">New Log</button>
    <button id="reset">Reset Cuts</button>
</div>

    </div>
    <script src="script.js"></script>
</body>
</html>
